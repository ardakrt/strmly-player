name: Build & Release

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.5.1
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify bundled TMDB key
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
        run: |
          if [ -z "$VITE_TMDB_API_KEY" ]; then
            echo "::error::VITE_TMDB_API_KEY GitHub Secret is missing. Add it in repository Settings > Secrets and variables > Actions."
            exit 1
          fi
        shell: bash

      - name: Build and package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run verify
            npx electron-builder --win --publish always
          else
            npm run verify
            npx electron-builder --linux --publish always
          fi
        shell: bash
