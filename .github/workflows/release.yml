name: Build & Release

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.5.1
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify bundled TMDB key
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
        run: |
          node <<'NODE'
          const key = process.env.VITE_TMDB_API_KEY?.trim() || '';

          if (!/^[a-f0-9]{32}$/i.test(key)) {
            console.error('::error::VITE_TMDB_API_KEY must be a 32-character TMDB v3 API key.');
            process.exit(1);
          }

          (async () => {
            const response = await fetch(`https://api.themoviedb.org/3/configuration?api_key=${key}`);
            if (!response.ok) {
              console.error(`::error::TMDB rejected VITE_TMDB_API_KEY with HTTP ${response.status}.`);
              process.exit(1);
            }
            console.log('TMDB release key validation passed.');
          })().catch((error) => {
            console.error(`::error::TMDB release key validation failed: ${error.message}`);
            process.exit(1);
          });
          NODE
        shell: bash

      - name: Build and package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run verify
            npx electron-builder --win --publish always
          else
            npm run verify
            npx electron-builder --linux --publish always
          fi
        shell: bash
