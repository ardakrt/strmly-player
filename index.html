<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" /></noscript>
    <title>Strmly</title>
    <style>
      /* Static boot splash: renders immediately from HTML/CSS alone, before
         the JS bundle loads/evaluates and React mounts. This avoids the
         perceived black-screen gap on startup (especially in dev mode where
         Vite has to transform the whole module graph on first request). */
      html, body { background: #040405; margin: 0; }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #040405;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      }
      #boot-splash .boot-logo {
        width: 80px;
        height: 80px;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.01);
        border: 1px solid rgba(255,255,255,0.04);
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      }
      #boot-splash .boot-logo img {
        width: 48px;
        height: 48px;
        object-fit: contain;
        opacity: 0.8;
      }
      #boot-splash h1 {
        font-size: 20px;
        font-weight: 300;
        letter-spacing: 0.45em;
        color: rgba(255,255,255,0.85);
        text-transform: uppercase;
        margin: 32px 0 0;
        padding-left: 0.45em;
      }
      #boot-splash .boot-bar {
        position: relative;
        height: 2px;
        width: 112px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255,255,255,0.06);
        margin-top: 32px;
      }
      #boot-splash .boot-bar span {
        position: absolute;
        inset: 0 auto 0 0;
        width: 50%;
        border-radius: 999px;
        background: #fff;
        box-shadow: 0 0 8px #fff;
        animation: boot-progress 1.1s ease-in-out infinite;
      }
      @keyframes boot-progress {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(220%); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-splash">
      <div class="boot-logo"><img src="./icon.png" alt="Strmly" /></div>
      <h1>STRMLY</h1>
      <div class="boot-bar"><span></span></div>
    </div>
    <script>
      (function() {
        try {
          var scale = localStorage.getItem('strmly_ui_scale');
          if (scale === 'small') document.documentElement.style.fontSize = '14px';
          else if (scale === 'large') document.documentElement.style.fontSize = '18.5px';
          
          var grain = localStorage.getItem('strmly_background_grain');
          if (grain === 'true') {
            var el = document.createElement('div');
            el.id = 'strmly-grain-overlay';
            el.className = 'grain-overlay';
            document.body.appendChild(el);
          }
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
